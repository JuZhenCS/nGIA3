name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python acceleration dependency
        run: python -m pip install numpy

      - name: Build with strict C++17 warnings
        run: make -C src

      - name: Run unit and C++ parity tests
        run: make -C src test

      - name: Verify the complete go.fas dataset
        run: |
          src/ngia3 makedb -f data/go.fas -p /tmp/go.cpp.packed
          python tools/makedb.py -f data/go.fas -p /tmp/go.python.packed --engine numpy
          cmp /tmp/go.cpp.packed /tmp/go.python.packed
          md5sum /tmp/go.cpp.packed /tmp/go.python.packed
